<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="400" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="purple2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#7c3aed" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="400" height="320" fill="url(#bg2)" rx="20"/>

  <!-- Background glow -->
  <circle cx="200" cy="160" r="160" fill="#7c3aed" fill-opacity="0.04"/>
  <circle cx="60" cy="260" r="80" fill="#2563eb" fill-opacity="0.05"/>

  <!-- Main video call card -->
  <rect x="60" y="60" width="280" height="180" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow2)"/>

  <!-- Video area - local user (small, top right) -->
  <rect x="234" y="74" width="88" height="66" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <circle cx="278" cy="97" r="18" fill="#334155"/>
  <circle cx="278" cy="88" r="9" fill="#475569"/>
  <path d="M259 112c0-10.5 8.5-17 19-17s19 6.5 19 17" fill="#475569"/>
  <!-- Camera icon overlay -->
  <rect x="260" y="122" width="36" height="10" rx="5" fill="#7c3aed" fill-opacity="0.8"/>
  <text x="278" y="130" font-family="system-ui,sans-serif" font-size="6" fill="white" text-anchor="middle">📹 You</text>

  <!-- Video area - remote user (large, left) -->
  <rect x="72" y="74" width="150" height="160" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <circle cx="147" cy="120" r="32" fill="#1e293b"/>
  <circle cx="147" cy="105" r="16" fill="#334155"/>
  <path d="M115 152c0-18 14.5-30 32-30s32 12 32 30" fill="#334155"/>
  <!-- Connected badge -->
  <rect x="80" y="210" width="80" height="16" rx="8" fill="#7c3aed" fill-opacity="0.9"/>
  <text x="120" y="221" font-family="system-ui,sans-serif" font-size="7" fill="white" text-anchor="middle">● Connected</text>
  <!-- Call duration -->
  <rect x="168" y="210" width="48" height="16" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="192" y="221" font-family="system-ui,sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">00:03:21</text>

  <!-- Remote user video area -->
  <rect x="234" y="148" width="88" height="88" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <circle cx="278" cy="178" r="22" fill="#1e293b"/>
  <circle cx="278" cy="166" r="11" fill="#334155"/>
  <path d="M256 200c0-13 9.5-21 22-21s22 8 22 21" fill="#334155"/>
  <!-- Remote waveform -->
  <g transform="translate(252, 218)">
    <rect x="0" y="4" width="3" height="8" rx="1.5" fill="#7c3aed" fill-opacity="0.6"/>
    <rect x="5" y="1" width="3" height="14" rx="1.5" fill="#7c3aed"/>
    <rect x="10" y="3" width="3" height="10" rx="1.5" fill="#7c3aed" fill-opacity="0.8"/>
    <rect x="15" y="0" width="3" height="16" rx="1.5" fill="#7c3aed"/>
    <rect x="20" y="5" width="3" height="6" rx="1.5" fill="#7c3aed" fill-opacity="0.5"/>
    <rect x="25" y="2" width="3" height="12" rx="1.5" fill="#7c3aed" fill-opacity="0.9"/>
    <rect x="30" y="4" width="3" height="8" rx="1.5" fill="#7c3aed" fill-opacity="0.7"/>
    <rect x="35" y="1" width="3" height="14" rx="1.5" fill="#7c3aed"/>
    <rect x="40" y="6" width="3" height="4" rx="1.5" fill="#7c3aed" fill-opacity="0.4"/>
    <rect x="45" y="3" width="3" height="10" rx="1.5" fill="#7c3aed" fill-opacity="0.8"/>
  </g>

  <!-- Control buttons -->
  <rect x="80" y="252" width="240" height="52" rx="14" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <!-- Mic button -->
  <circle cx="130" cy="278" r="18" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="126" y="268" width="8" height="12" rx="4" fill="#94a3b8"/>
  <path d="M122 278c0 5 3.5 9 8 9s8-4 8-9" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
  <line x1="130" y1="287" x2="130" y2="291" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Camera button (active) -->
  <circle cx="200" cy="278" r="18" fill="#7c3aed"/>
  <rect x="191" y="272" width="12" height="10" rx="2" fill="white"/>
  <path d="M203 275l5-3v12l-5-3" fill="white"/>
  <!-- End call button -->
  <circle cx="270" cy="278" r="18" fill="#ef4444"/>
  <line x1="262" y1="278" x2="278" y2="278" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M262 276 Q200 265 278 276" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Encrypted label top -->
  <rect x="140" y="36" width="120" height="22" rx="11" fill="#1e293b" stroke="#7c3aed" stroke-width="1"/>
  <text x="200" y="50" font-family="system-ui,sans-serif" font-size="8.5" fill="#a78bfa" text-anchor="middle" font-weight="600">🔒 Encrypted Call</text>
</svg>
