<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="400" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2563eb" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="400" height="320" fill="url(#bg1)" rx="20"/>

  <!-- Background glow circles -->
  <circle cx="80" cy="80" r="120" fill="#2563eb" fill-opacity="0.05"/>
  <circle cx="320" cy="240" r="100" fill="#7c3aed" fill-opacity="0.05"/>

  <!-- Left user device -->
  <rect x="32" y="100" width="120" height="160" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="38" y="108" width="108" height="82" rx="8" fill="#0f172a"/>
  <!-- Left chat bubbles -->
  <rect x="44" y="114" width="64" height="22" rx="10" fill="#2563eb"/>
  <text x="76" y="128" font-family="system-ui,sans-serif" font-size="8" fill="white" text-anchor="middle">Hello! 👋</text>
  <rect x="56" y="142" width="72" height="22" rx="10" fill="#1d4ed8"/>
  <text x="92" y="156" font-family="system-ui,sans-serif" font-size="7" fill="white" text-anchor="middle">Secure chat ✓</text>
  <!-- Phone notch -->
  <rect x="70" y="106" width="52" height="6" rx="3" fill="#334155"/>
  <!-- Bottom bar -->
  <rect x="50" y="228" width="92" height="24" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <circle cx="92" cy="240" r="3" fill="#2563eb"/>

  <!-- Right user device -->
  <rect x="248" y="100" width="120" height="160" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="254" y="108" width="108" height="82" rx="8" fill="#0f172a"/>
  <!-- Right chat bubbles -->
  <rect x="282" y="114" width="72" height="22" rx="10" fill="#7c3aed"/>
  <text x="318" y="128" font-family="system-ui,sans-serif" font-size="8" fill="white" text-anchor="middle">Hi there! 🔒</text>
  <rect x="270" y="142" width="64" height="22" rx="10" fill="#6d28d9"/>
  <text x="302" y="156" font-family="system-ui,sans-serif" font-size="7" fill="white" text-anchor="middle">End-to-end 🛡</text>
  <!-- Phone notch -->
  <rect x="278" y="106" width="52" height="6" rx="3" fill="#334155"/>
  <!-- Bottom bar -->
  <rect x="258" y="228" width="92" height="24" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <circle cx="304" cy="240" r="3" fill="#7c3aed"/>

  <!-- Center lock shield -->
  <circle cx="200" cy="180" r="38" fill="url(#glow1)" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="200" cy="180" r="28" fill="#0f172a" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow1)"/>
  <!-- Lock body -->
  <rect x="188" y="178" width="24" height="18" rx="4" fill="#2563eb"/>
  <path d="M191 178v-6a9 9 0 0118 0v6" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="200" cy="187" r="3" fill="white"/>
  <rect x="199" y="187" width="2" height="5" rx="1" fill="white"/>

  <!-- Connection lines with dots -->
  <line x1="158" y1="170" x2="172" y2="175" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="3,3" stroke-opacity="0.6"/>
  <line x1="228" y1="175" x2="242" y2="170" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="3,3" stroke-opacity="0.6"/>
  <circle cx="158" cy="170" r="3" fill="#2563eb" fill-opacity="0.8"/>
  <circle cx="242" cy="170" r="3" fill="#2563eb" fill-opacity="0.8"/>

  <!-- Encrypted badge -->
  <rect x="148" y="48" width="104" height="28" rx="14" fill="#1e293b" stroke="#2563eb" stroke-width="1"/>
  <text x="200" y="65" font-family="system-ui,sans-serif" font-size="9" fill="#60a5fa" text-anchor="middle" font-weight="600">🔐 End-to-End Encrypted</text>

  <!-- Ephemeral badge -->
  <rect x="130" y="282" width="140" height="24" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="200" y="297" font-family="system-ui,sans-serif" font-size="8.5" fill="#94a3b8" text-anchor="middle">Messages vanish after session</text>
</svg>
