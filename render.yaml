# Render.com deployment configuration
version: "1"

services:
  - type: web
    name: chatwave
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: ORIGIN
        fromService:
          type: web
          name: chatwave
          property: url